version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: raveminds_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3

  ipo_surge:
    build: .
    container_name: raveminds_ipo_surge
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      - OLLAMA_URL=http://ollama:11434/api/generate
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    command: >
      bash -c "python scripts/seed_data.py &&
               streamlit run ui/app.py --server.port=8501 --server.address=0.0.0.0"

volumes:
  ollama_data:
